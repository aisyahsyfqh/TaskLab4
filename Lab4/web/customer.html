<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Customer Discount Form</title>
        <style>
            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background-color: #f4f7f6;
                margin: 0;
                padding: 20px;
                display: block;
            }
            .container {
                width: 100%;
                max-width: 900px;
                margin: 0 auto;
            }
            h1 {
                font-size: 1.5rem;
                color: #333;
                margin-bottom: 20px;
                border-left: 5px solid #6f42c1;
                padding-left: 10px;
            }
            .card {
                background: #ffffff;
                padding: 30px;
                border-radius: 8px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            }
            .form-title {
                color: #6f42c1;
                font-size: 1.8rem;
                font-weight: 600;
                margin-bottom: 25px;
                text-transform: capitalize;
            }
            .form-group {
                margin-bottom: 20px;
            }
            label {
                display: block;
                font-weight: bold;
                margin-bottom: 8px;
                color: #555;
            }
            input[type="text"], input[type="number"] {
                width: 100%;
                padding: 10px;
                border: 1px solid #ddd;
                border-radius: 4px;
                box-sizing: border-box;
            }
            .radio-group {
                display: flex;
                gap: 20px;
                align-items: center;
            }
            .radio-label {
                font-weight: normal;
                cursor: pointer;
                display: flex;
                align-items: center;
                gap: 5px;
            }
            .button-group {
                margin-top: 30px;
                display: flex;
                gap: 10px;
            }
            .btn {
                padding: 10px 25px;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                font-weight: bold;
                transition: 0.3s;
            }
            .btn-submit {
                background-color: #e0e0e0;
                color: #333;
                border: 1px solid #adadad;
            }
            .btn-submit:hover {
                background-color: #d0d0d0;
            }
            .btn-cancel {
                background-color: #e0e0e0;
                color: #333;
                border: 1px solid #adadad;
            }
            .btn-cancel:hover {
                background-color: #ffcccc;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Use JSP Scriptlet and JSP Expression in Application</h1>
            <div class="card">
                <h2 class="form-title">Customer Discount</h2>
                <form action="processCustomer.jsp" method="post">

                    <!-- Customer Code -->
                    <div class="form-group">
                        <label for="customerCode">Customer Code</label>
                        <input type="text" id="customerCode" name="customerCode" placeholder="Key-in customer code" required>
                    </div>

                    <!-- Quantity (numeric only) -->
                    <div class="form-group">
                        <label for="quantity">Quantity</label>
                        <input type="number" id="quantity" name="quantity" placeholder="Key-in quantity" required>
                    </div>

                    <!-- Customer Type -->
                    <div class="form-group">
                        <label>Customer Type</label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="customerType" value="1" checked> Normal Customer
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="customerType" value="2"> Privilege Customer
                            </label>
                        </div>
                    </div>

                    <!-- Buttons -->
                    <div class="button-group">
                        <button type="submit" class="btn btn-submit">Submit</button>
                        <button type="reset" class="btn btn-cancel">Cancel</button>
                    </div>

                </form>
            </div>
        </div>
    </body>
</html>
